name: Run nf-test on PR to dev with Docker

on:
  pull_request:
    branches:
      - dev
    types:
      - opened
      - synchronize
      - reopened

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Docker
        uses: docker/setup-buildx-action@v2

      - name: Build Docker image from Dockerfile
        run: |
          docker build -t nf-test-image .

      - name: Run nf-test inside Docker container
        run: |
          docker run --rm -v $(pwd):/workspace nf-test-image bash -c "nf-test test"
