name: NF-Core Linting and Testing

on:
  push:
    branches:
      - dev
      - main
  pull_request:
    branches:
      - dev
      - main

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v2
        with:
          auto-activate-base: false

      - name: Initialize Conda
        run: |
          conda init bash
          source ~/.bashrc

      - name: Create environment from environment.yml
        run: |
          conda env create -f environment.yml
          conda activate $(head -n 1 environment.yml | cut -d' ' -f2)

      - name: Install nf-core and Nextflow
        run: |
          conda install -c conda-forge nf-core nextflow

      - name: Run nf-core linting
        run: |
          nf-core lint .

      - name: Run nf-core tests
        run: |
          nf-core run-info .
          nf-core tests .
