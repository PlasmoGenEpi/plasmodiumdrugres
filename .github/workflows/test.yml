name: Run nf-test on PR to dev with Docker

on:
  pull_request:
    branches:
      - dev
    types:
      - opened
      - synchronize
      - reopened

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository with submodules
        uses: actions/checkout@v3
        with:
          submodules: recursive # Ensures submodules are fetched and updated
          fetch-depth: 0 # Fetch all history to avoid shallow clones

      - name: Set up Docker image
        run: |
          docker build -t nf-core-pipeline .

      - name: Set up nf-test
        uses: nf-core/setup-nf-test@v1
        with:
          install-pdiff: true

      # - name: Run nf-test
      #   run: |
      #     source $(conda info --base)/etc/profile.d/conda.sh
      #     conda activate nf-core-pipeline-env
      #     nf-test test

      # - name: Run nf-test
      #   run: |
      #     docker run --rm \
      #       -v ${{ github.workspace }}:/workspace \
      #       -w /workspace \
      #       nf-core-pipeline \
      #       bash -c "nf-test test"


      - name: Run nf-test
        run: |
          nf-test test \
            --docker-image nf-core-pipeline

